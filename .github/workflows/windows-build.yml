name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            src/requirements.txt
            requirements.txt

      - name: Install dependencies (pinned first)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "src/requirements.txt") {
            pip install -r src/requirements.txt
          } elseif (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }

      - name: Validate sources compile
        shell: pwsh
        run: |
          python -m compileall -q src build_exe.py

      - name: Build Windows EXE (standardized onedir flow)
        shell: pwsh
        run: |
          python build_exe.py --name ECGMonitor
          if (!(Test-Path "dist/ECGMonitor/ECGMonitor.exe")) {
            Write-Error "Expected executable missing: dist/ECGMonitor/ECGMonitor.exe"
            exit 1
          }

      - name: Upload EXE artifact (full onedir package)
        uses: actions/upload-artifact@v4
        with:
          name: ECGMonitor-windows-onedir
          path: dist/ECGMonitor/**
          if-no-files-found: error
